name: Docker CI/CD

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: email-ai-analyzer
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # 1. Checkout
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Cache Maven
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # 3. Setup JDK 24
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 24

      # 4. Run tests
      - name: Run tests
        run: mvn test

      # 5. Build JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # After: Build JAR
      - name: Normalize JAR name
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "Using JAR: $JAR_FILE"
          cp "$JAR_FILE" target/app.jar

      # 6. Prepare image name (safe)
      - name: Prepare image
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "⚠️ No Docker username, using local image"
            echo "IMAGE=${IMAGE_NAME}:latest" >> $GITHUB_ENV
          else
            USER_LOWER=$(echo "$DOCKER_USERNAME" | tr '[:upper:]' '[:lower:]')
            echo "IMAGE=$USER_LOWER/${IMAGE_NAME}:latest" >> $GITHUB_ENV
          fi

      # 7. Login to Docker Hub (FIXED)
      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      # 8. Build image
      - name: Build Docker image
        run: docker build -t $IMAGE .

      # 9. Push image (FIXED)
      - name: Push Docker image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        run: docker push $IMAGE

      # 10. Check deploy credentials
      - name: Check deploy credentials
        id: check_deploy
        run: |
          if [ -n "${{ secrets.SERVER_HOST }}" ] && \
             [ -n "${{ secrets.SERVER_USER }}" ] && \
             [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "⚠️ Deploy skipped: Missing SSH credentials"
          fi

      # 11. Deploy (only if creds exist)
      - name: Deploy to Ubuntu server
        if: ${{ steps.check_deploy.outputs.deploy == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest image..."
            docker pull $IMAGE

            echo "🛑 Stopping old container..."
            docker stop email-ai || true
            docker rm email-ai || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name email-ai \
              -p 8080:8080 \
              --restart always \
              $IMAGE

            echo "⏳ Waiting for app..."
            sleep 10

            echo "🔍 Health check..."
            curl -f http://localhost:8080/actuator/health || (echo "❌ Health check failed" && exit 1)

            echo "✅ Deployment successful"