name: Docker CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: email-ai-analyzer

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 24 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'
          # We keep the cache config but will manually purge it to ensure a clean slate
          cache: 'maven'

      - name: Purge Maven Local Repository
        run: rm -rf ~/.m2/repository/*
        shell: bash

      - name: Build with Maven
        # -U forces update of dependencies to solve that missing MySQL driver issue
        run: mvn clean package -DskipTests -U

      - name: Validate Docker Hub secrets and prepare image tag
        id: prepare
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is empty or missing."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is empty or missing."
            exit 1
          fi
          DOCKER_USER_LOWER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=${DOCKER_USER_LOWER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${{ steps.prepare.outputs.docker_image }}" .

      - name: Push Docker image to Docker Hub
        run: docker push "${{ steps.prepare.outputs.docker_image }}"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ steps.prepare.outputs.docker_image }}
            docker stop email-ai-analyzer || true
            docker rm email-ai-analyzer || true
            # Mapping to 8081 because your Spring logs show the app starts on 8081
            docker run -d --restart always \
              -p 8081:8081 \
              --name email-ai-analyzer \
              -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASS }} \
              ${{ steps.prepare.outputs.docker_image }}