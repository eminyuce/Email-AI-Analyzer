name: Docker CI/CD

on:
  push:
    branches: ["master"]

# CI: GitHub Actions Variables (Settings → Actions → Variables) for optional Maven: GROQ_API_KEY, DEBUG_LOG_SECRETS.
# For Docker Hub push: set DOCKER_USERNAME and DOCKER_PASSWORD as repository Encrypted Secrets
# (Settings → Secrets and variables → Actions → Secrets). Runtime deploy: SECURITY_USER, SECURITY_PASS, DB_*, etc. — see .env.example

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: email-ai-analyzer
      GROQ_API_KEY: ${{ vars.GROQ_API_KEY }}
      DEBUG_LOG_SECRETS: ${{ vars.DEBUG_LOG_SECRETS || 'false' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK 24 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 24

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare Docker image tag
        id: prepare
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            DOCKER_USER_LOWER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
            echo "docker_image=${DOCKER_USER_LOWER}/${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "docker_image=${IMAGE_NAME}:ci" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: docker build -t "${{ steps.prepare.outputs.docker_image }}" .

      - name: Login and push to Docker Hub
        if: ${{ steps.prepare.outputs.push == 'true' }}
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin
          docker push "${{ steps.prepare.outputs.docker_image }}"
