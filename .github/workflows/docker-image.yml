name: Docker CI/CD

on:
  push:
    branches: ["master"]

# Runtime login uses SECURITY_USER / SECURITY_PASS (see ActuatorSecurityConfig). They are not used in this
# build job unless you add a deploy step. Create repository secrets SECURITY_USER and SECURITY_PASS, then pass
# them into your host or container environment. For temporary debugging, set SECURITY_LOG_CREDENTIALS_ON_STARTUP=true
# on the running app so startup logs echo the values actually received (turn off afterward).

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: email-ai-analyzer

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 24 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 24
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare Docker image tag
        id: prepare
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is missing"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD is missing"
            exit 1
          fi

          DOCKER_USER_LOWER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=${DOCKER_USER_LOWER}/${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t "${{ steps.prepare.outputs.docker_image }}" .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push "${{ steps.prepare.outputs.docker_image }}"

