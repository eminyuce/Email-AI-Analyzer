name: Docker CI/CD

on:
  push:
    branches: [ "master" ]
    # Removed tags trigger to keep it strictly commit-based

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: email-ai-analyzer
      DOCKER_REPO: guvenulu

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 24 (Amazon Corretto)
        uses: talent-plan/setup-java@v4 # Using v4 as in your snippet
        with:
          distribution: 'corretto'
          java-version: '24'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Strictly using only the 'latest' tag
          tags: ${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest
          # Recommended for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max