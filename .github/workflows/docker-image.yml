name: Docker CI/CD

on:
  push:
    branches: ["master"]

# Runtime login uses SECURITY_USER / SECURITY_PASS (see ActuatorSecurityConfig). Pass them into your host or
# container environment when you deploy. For temporary debugging of plaintext credentials in logs, set
# DEBUG_LOG_SECRETS=true (repository secret DEBUG_LOG_SECRETS) and/or SECURITY_LOG_CREDENTIALS_ON_STARTUP=true
# on the running process; disable afterward.

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: email-ai-analyzer
      GROQ_API_KEY: ${{ secrets.GROQ_LLM_API_KEY }}
      DEBUG_LOG_SECRETS: ${{ secrets.DEBUG_LOG_SECRETS }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK 24 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 24

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare Docker image tag
        id: prepare
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is missing"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD is missing"
            exit 1
          fi

          DOCKER_USER_LOWER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=${DOCKER_USER_LOWER}/${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t "${{ steps.prepare.outputs.docker_image }}" .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push "${{ steps.prepare.outputs.docker_image }}"

