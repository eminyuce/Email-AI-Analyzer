name: Docker CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: email-ai-analyzer

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 24 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t email-ai-analyzer:latest .
      - name: Validate Docker Hub secrets and prepare image tag
        id: prepare
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is empty or missing."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is empty or missing."
            exit 1
          fi
          DOCKER_USER_LOWER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=${DOCKER_USER_LOWER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker image for Docker Hub
        run: docker tag email-ai-analyzer:latest ${{ secrets.DOCKER_USERNAME }}/email-ai-analyzer:latest
      - name: Build Docker image
        run: docker build -t "${{ steps.prepare.outputs.docker_image }}" .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/email-ai-analyzer:latest
        run: docker push "${{ steps.prepare.outputs.docker_image }}"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/email-ai-analyzer:latest
            docker pull ${{ steps.prepare.outputs.docker_image }}
            docker stop email-ai-analyzer || true
            docker rm email-ai-analyzer || true
            docker run -d --restart always -p 8080:8080 --name email-ai-analyzer ${{ secrets.DOCKER_USERNAME }}/email-ai-analyzer:latest
            docker run -d --restart always -p 8080:8080 --name email-ai-analyzer ${{ steps.prepare.outputs.docker_image }}

