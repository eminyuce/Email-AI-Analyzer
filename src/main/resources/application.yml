server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: email-ai-analyzer
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/email_db}
    username: ${DB_USER:email_user}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
        options:
          num_gpu: 1
          main_gpu: 0
          temperature: 0.3

email:
  analysis:
    cron: "0 */5 * * * *"
    default-date-range-days: 1
    default-max-emails: 1000

logging:
  level:
    root: INFO
    com.logilink.emailanalyzer: DEBUG
