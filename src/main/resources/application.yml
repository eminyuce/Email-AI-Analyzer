server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: email-ai-analyzer
  profiles:
    default: local

  # Added mail configuration here to resolve the "Server is not trusted" error
  mail:
    properties:
      mail:
        imap:
          ssl:
            trust: "*"
        imaps:
          ssl:
            trust: "*"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

# When true, logs may include plaintext secrets. Use only for debugging.
app:
  debug-log-secrets: ${DEBUG_LOG_SECRETS:false}

email:
  imap:
    connection-timeout-ms: 10000
    timeout-ms: 20000
    write-timeout-ms: 20000
    ssl-trust: "*"
  analysis:
    default-date-range-days: 1
    default-max-emails: 1000

ai:
  test:
    connect-timeout-seconds: 10
    request-timeout-seconds: 75

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: https://api.groq.com/openai/v1

logging:
  level:
    root: INFO
    com.logilink.emailanalyzer: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: my-app
      region: us-east-1
    enable:
      hikaricp: true
      tomcat: true
      logback: true
    distribution:
      slo:
        analysis.processing.latency: 50ms,100ms,500ms
      percentiles:
        analysis.processing.latency: 0.95,0.99
      percentiles-histogram:
        analysis.processing.latency: true

info:
  build:
    enabled: true
  env:
    enabled: true
