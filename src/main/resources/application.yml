server:
  port: 8081
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}

spring:
  application:
    name: email-ai-analyzer
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/email_db}
    username: ${DB_USER:email_user}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
        options:
          num_gpu: 1
          main_gpu: 0
          temperature: 0.3

email:
  analysis:
    cron: "0 */5 * * * *"

logging:
  level:
    root: INFO
    com.logilink.emailanalyzer: DEBUG
