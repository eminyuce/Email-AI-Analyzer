<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Analyzed Emails</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Analyzed Emails</h1>
    </div>

    <!-- Filters Section -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/emails}" method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="keyword" class="form-label">Keyword</label>
                    <input type="text" class="form-control" id="keyword" name="keyword" th:value="${keyword}"
                           placeholder="Subject or Sender...">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Criticality</label>
                    <div class="d-flex gap-2">
                        <select class="form-select" name="criticalityLevels" multiple size="3">
                            <option value="CRITICAL"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('CRITICAL')}">
                                CRITICAL
                            </option>
                            <option value="HIGH"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('HIGH')}">
                                HIGH
                            </option>
                            <option value="MEDIUM"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('MEDIUM')}">
                                MEDIUM
                            </option>
                            <option value="LOW"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('LOW')}">LOW
                            </option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Action Needed</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="actionNeeded" name="actionNeeded"
                               value="true" th:checked="${actionNeeded == true}">
                        <label class="form-check-label" for="actionNeeded">Required</label>
                    </div>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i> Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Table Section -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Score</th>
                        <th>Level</th>
                        <th>Subject</th>
                        <th>Sender</th>
                        <th>Email Date</th>
                        <th>Processed</th>
                        <th>Action</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="email : ${page.content}">
                        <td>
                            <span th:class="|badge rounded-pill ${email.criticalityScore >= 80 ? 'bg-danger' : (email.criticalityScore >= 50 ? 'bg-warning' : 'bg-success')}|"
                                  th:text="${email.criticalityScore}">
                            </span>
                        </td>
                        <td>
                            <span th:class="|badge ${email.criticalityLevel == 'CRITICAL' ? 'bg-danger' : (email.criticalityLevel == 'HIGH' ? 'bg-warning text-dark' : (email.criticalityLevel == 'MEDIUM' ? 'bg-info text-dark' : 'bg-secondary'))}|"
                                  th:text="${email.criticalityLevel}">
                            </span>
                        </td>
                        <td th:text="${email.subject}">Subject</td>
                        <td th:text="${email.sender}">Sender</td>
                        <td th:text="${#temporals.format(email.emailDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                        <td th:text="${#temporals.format(email.processedAt, 'yyyy-MM-dd HH:mm')}">Processed</td>
                        <td>
                            <i th:if="${email.actionNeeded}" class="bi bi-exclamation-circle-fill text-danger"
                               title="Action Needed"></i>
                            <i th:unless="${email.actionNeeded}" class="bi bi-check-circle-fill text-success"
                               title="No Action"></i>
                        </td>
                        <td>
                            <a th:href="@{/emails/{id}(id=${email.emailId})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${page.isEmpty()}">
                        <td colspan="8" class="text-center py-4">No analyzed emails found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer" th:if="${page.totalPages > 1}">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${page.first ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/emails(page=${page.number - 1}, keyword=${keyword})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                        th:classappend="${page.number == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/emails(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${page.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/emails(page=${page.number + 1}, keyword=${keyword})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
