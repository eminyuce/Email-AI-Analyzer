<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Analyzed Emails</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Analyzed Emails</h1>
        <form th:action="@{/emails/delete-all}" method="post" class="d-inline"
              onsubmit="return confirm('Delete all analyzed emails? This action cannot be undone.');">
            <button type="submit" class="btn btn-outline-danger">
                <i class="bi bi-trash me-1"></i>Delete All
            </button>
        </form>
    </div>

    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${deletedAll}">
        Deleted <span th:text="${deletedCount}">0</span> analyzed email(s).
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Filters Section -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/emails}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label for="keyword" class="form-label">Keyword</label>
                    <input type="text" class="form-control" id="keyword" name="keyword" th:value="${keyword}"
                           placeholder="Subject, sender, or message body…">
                </div>
                <div class="col-md-3">
                    <label for="settingId" class="form-label">Settings profile</label>
                    <select class="form-select" id="settingId" name="settingId">
                        <option value="" th:selected="${settingId == null}">All profiles</option>
                        <option th:each="p : ${settingsProfiles}" th:value="${p.id}"
                                th:selected="${settingId != null && settingId == p.id}"
                                th:text="${'Profile #' + p.id + (p.active ? ' (active)' : '')}">1
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Criticality</label>
                    <div class="d-flex gap-2">
                        <select class="form-select" name="criticalityLevels" multiple size="3">
                            <option value="CRITICAL"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('CRITICAL')}">
                                CRITICAL
                            </option>
                            <option value="HIGH"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('HIGH')}">
                                HIGH
                            </option>
                            <option value="MEDIUM"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('MEDIUM')}">
                                MEDIUM
                            </option>
                            <option value="LOW"
                                    th:selected="${criticalityLevels != null && criticalityLevels.contains('LOW')}">LOW
                            </option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Action Needed</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="actionNeeded" name="actionNeeded"
                               value="true" th:checked="${actionNeeded == true}">
                        <label class="form-check-label" for="actionNeeded">Required</label>
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i> Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Table Section -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Score</th>
                        <th>Level</th>
                        <th>Profile</th>
                        <th>Subject</th>
                        <th>Sender</th>
                        <th>Body preview</th>
                        <th>Email Date</th>
                        <th>Processed</th>
                        <th>Action</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="email : ${page.content}">
                        <td>
                            <span th:class="|badge rounded-pill ${email.criticalityScore >= 80 ? 'bg-danger' : (email.criticalityScore >= 50 ? 'bg-warning' : 'bg-success')}|"
                                  th:text="${email.criticalityScore}">
                            </span>
                        </td>
                        <td>
                            <span th:class="|badge ${email.criticalityLevel == 'CRITICAL' ? 'bg-danger' : (email.criticalityLevel == 'HIGH' ? 'bg-warning text-dark' : (email.criticalityLevel == 'MEDIUM' ? 'bg-info text-dark' : 'bg-secondary'))}|"
                                  th:text="${email.criticalityLevel}">
                            </span>
                        </td>
                        <td>
                            <a th:if="${email.settingId != null}" th:href="@{/settings/{id}(id=${email.settingId})}"
                               class="text-decoration-none" th:text="${'#' + email.settingId}">#1</a>
                            <span th:if="${email.settingId == null}" class="text-muted">—</span>
                        </td>
                        <td class="text-truncate align-middle" style="max-width: 11rem;" th:title="${email.subject}"
                            th:text="${email.subject != null ? email.subject : '—'}">Subject</td>
                        <td class="text-truncate align-middle" style="max-width: 10rem;" th:title="${email.sender}"
                            th:text="${email.sender != null ? email.sender : '—'}">Sender</td>
                        <td class="small text-muted align-middle" style="max-width: 16rem;">
                            <span th:if="${email.content == null || #strings.isEmpty(email.content)}">—</span>
                            <span th:unless="${email.content == null || #strings.isEmpty(email.content)}"
                                  th:text="${#strings.abbreviate(email.content, 120)}"
                                  th:title="${email.content}">Preview</span>
                        </td>
                        <td th:text="${#temporals.format(email.emailDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                        <td th:text="${#temporals.format(email.processedAt, 'yyyy-MM-dd HH:mm')}">Processed</td>
                        <td>
                            <i th:if="${email.actionNeeded}" class="bi bi-exclamation-circle-fill text-danger"
                               title="Action Needed"></i>
                            <i th:unless="${email.actionNeeded}" class="bi bi-check-circle-fill text-success"
                               title="No Action"></i>
                        </td>
                        <td>
                            <a th:href="@{/emails/{id}(id=${email.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${page.isEmpty()}">
                        <td colspan="10" class="text-center py-4">No analyzed emails found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer" th:if="${page.totalPages > 1}">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${page.first ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/emails(page=${page.number - 1}, keyword=${keyword}, settingId=${settingId}, actionNeeded=${actionNeeded})}">Previous</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                        th:classappend="${page.number == i ? 'active' : ''}">
                        <a class="page-link"
                           th:href="@{/emails(page=${i}, keyword=${keyword}, settingId=${settingId}, actionNeeded=${actionNeeded})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${page.last ? 'disabled' : ''}">
                        <a class="page-link"
                           th:href="@{/emails(page=${page.number + 1}, keyword=${keyword}, settingId=${settingId}, actionNeeded=${actionNeeded})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
