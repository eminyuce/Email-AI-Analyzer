<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Settings Profiles</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .settings-profile-list tbody tr.settings-profile-active > td {
            background-color: #ffe5e5 !important;
        }
    </style>
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Settings Profiles</h1>
        <div class="d-flex align-items-center gap-2">
            <a href="/settings/new" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>New Settings
            </a>
            <form th:action="@{/settings/duplicate}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-files me-1"></i>Duplicate
                </button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0 settings-profile-list">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Updated</th>
                        <th>LLM</th>
                        <th>Model</th>
                        <th>Email</th>
                        <th>System prompt</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${profiles}"
                        th:classappend="${p.id == activeProfileId} ? 'settings-profile-active' : ''">
                        <td>
                            <span th:text="${p.id}">1</span>
                            <span class="badge text-bg-dark ms-1 text-uppercase"
                                  th:if="${p.id == activeProfileId}"
                                  title="This profile is used for email processing">Active</span>
                        </td>
                        <td class="small text-nowrap text-muted"
                            th:text="${p.updatedAt != null ? #temporals.format(p.updatedAt, 'yyyy-MM-dd HH:mm') : '—'}">
                            —
                        </td>
                        <td class="small">
                            <span class="badge bg-secondary text-uppercase"
                                  th:text="${p.llmProvider != null ? p.llmProvider : 'ollama'}">ollama</span>
                            <div class="text-muted text-break mt-1"
                                 th:if="${p.llmProvider != null and #strings.equalsIgnoreCase(p.llmProvider, 'groq')}">
                                Groq cloud
                            </div>
                            <div class="text-muted text-break mt-1"
                                 th:unless="${p.llmProvider != null and #strings.equalsIgnoreCase(p.llmProvider, 'groq')}"
                                 th:text="${p.llmUrl != null ? #strings.abbreviate(p.llmUrl, 50) : '—'}">—
                            </div>
                        </td>
                        <td class="text-break"
                            th:text="${p.llmModel != null ? #strings.abbreviate(p.llmModel, 50) : '-'}">-
                        </td>
                        <td class="text-break"
                            th:text="${p.mailUsername != null ? #strings.abbreviate(p.mailUsername, 50) : '-'}">-
                        </td>
                        <td class="text-break"
                            th:text="${p.systemPrompt != null ? #strings.abbreviate(p.systemPrompt, 50) : '-'}">-
                        </td>
                        <td class="text-end">
                            <a class="btn btn-outline-primary btn-sm me-1" th:href="@{/settings/{id}(id=${p.id})}">
                                Edit
                            </a>
                            <form th:if="${p.id != activeProfileId}" th:action="@{/settings/{id}/activate(id=${p.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-success btn-sm">Activate</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
