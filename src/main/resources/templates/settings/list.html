<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Settings Profiles</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Settings Profiles</h1>
        <div class="d-flex align-items-center gap-2">
            <a href="/settings/new" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>New Settings
            </a>
            <form th:action="@{/settings/duplicate}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-files me-1"></i>Duplicate
                </button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Mail Host</th>
                        <th>LLM Model</th>
                        <th>Cron</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${profiles}">
                        <td th:text="${p.id}">1</td>
                        <td>
                            <span class="badge bg-success" th:if="${p.id == activeProfileId}">Active</span>
                            <span class="badge bg-secondary" th:if="${p.id != activeProfileId}">Inactive</span>
                        </td>
                        <td th:text="${p.mailHost != null ? p.mailHost : '-'}">-</td>
                        <td th:text="${p.llmModel != null ? p.llmModel : '-'}">-</td>
                        <td th:text="${p.schedulerCron != null ? p.schedulerCron : '-'}">-</td>
                        <td class="text-end">
                            <a class="btn btn-outline-primary btn-sm me-1" th:href="@{/settings/{id}(id=${p.id})}">
                                Edit
                            </a>
                            <form th:if="${p.id != activeProfileId}" th:action="@{/settings/{id}/activate(id=${p.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-success btn-sm">Activate</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
