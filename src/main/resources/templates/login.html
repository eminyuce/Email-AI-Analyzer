<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | Email AI Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d21 0%, #343a40 100%); min-height: 100vh; }
        .login-card { max-width: 420px; border-radius: 12px; border: none; box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.35); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="w-100 px-3">
    <div class="card login-card mx-auto">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-robot text-primary" style="font-size: 2.5rem;"></i>
                <h1 class="h4 mt-2 mb-0">Email AI Analyzer</h1>
                <p class="text-muted small mb-0">Sign in to continue</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" autocomplete="username"
                           required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
                </button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
